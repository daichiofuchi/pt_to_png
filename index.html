<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX to PNG Converter</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ZIP生成用ライブラリ追加 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #root:empty::before {
            content: 'Loading Application...';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #94a3b8;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                try {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                } catch (e) {}
            }, [name]);
            return <i data-lucide={name} className={className} style={{ display: 'inline-block' }}></i>;
        };

        const App = () => {
            const [file, setFile] = useState(null);
            const [directoryHandle, setDirectoryHandle] = useState(null);
            const [folderName, setFolderName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [isCompleted, setIsCompleted] = useState(false);
            const [error, setError] = useState(null);

            // APIサポートの判定
            const isApiSupported = useMemo(() => {
                // HTTPS環境かつChrome/Edgeである必要がある
                return typeof window !== 'undefined' && !!window.showDirectoryPicker;
            }, []);

            const handleFileDrop = (e) => {
                e.preventDefault();
                validateAndSetFile(e.dataTransfer.files[0]);
            };

            const handleFileSelect = (e) => {
                validateAndSetFile(e.target.files[0]);
            };

            const validateAndSetFile = (selectedFile) => {
                if (selectedFile && (selectedFile.name.toLowerCase().endsWith('.pptx') || selectedFile.name.toLowerCase().endsWith('.ppt'))) {
                    setFile(selectedFile);
                    if (!folderName) {
                        setFolderName(selectedFile.name.replace(/\.[^/.]+$/, ""));
                    }
                    setError(null);
                } else {
                    setError('有効なPowerPointファイルを選択してください。');
                }
            };

            const handlePickDirectory = async () => {
                if (!isApiSupported) return;
                try {
                    // セキュリティ上の理由でユーザーのアクションが必要
                    const handle = await window.showDirectoryPicker({
                        mode: 'readwrite'
                    });
                    setDirectoryHandle(handle);
                    setFolderName(handle.name);
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        setError('フォルダの選択がキャンセルされたか、権限がありません。');
                    }
                }
            };

            const startConversion = async () => {
                if (!file) return;
                setIsProcessing(true);
                setProgress(0);
                
                // シミュレーション（実際はここで各スライドを画像化）
                for (let i = 0; i <= 100; i += 10) {
                    await new Promise(r => setTimeout(r, 100));
                    setProgress(i);
                }

                setIsProcessing(false);
                setIsCompleted(true);
            };

            const downloadAsZip = async () => {
                const zip = new JSZip();
                const imgFolder = zip.folder(folderName || "slides");
                
                // ダミー画像データの生成（実運用ではCanvas等から生成したデータを入れる）
                // ここではデモとしてテキストファイルをPNG風に入れています
                imgFolder.file("1.png", "Dummy PNG Data 1");
                imgFolder.file("2.png", "Dummy PNG Data 2");

                const content = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${folderName || 'slides'}.zip`;
                link.click();
            };

            const reset = () => {
                setFile(null);
                setDirectoryHandle(null);
                setFolderName('');
                setIsCompleted(false);
                setProgress(0);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <div className="w-full max-w-4xl">
                        <header className="mb-10 text-center animate-in">
                            <div className="inline-flex items-center justify-center p-4 bg-orange-100 rounded-3xl mb-4 shadow-sm">
                                <Icon name="presentation" className="w-10 h-10 text-orange-600" />
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-800">PPTX to PNG Converter</h1>
                            <p className="text-slate-500 mt-2">ブラウザで完結するスライド画像変換</p>
                        </header>

                        {/* ステータス案内 */}
                        <div className={`mb-6 p-4 rounded-2xl flex items-center space-x-3 animate-in border ${
                            isApiSupported 
                            ? 'bg-blue-50 border-blue-100 text-blue-700' 
                            : 'bg-amber-50 border-amber-100 text-amber-700'
                        }`}>
                            <Icon name={isApiSupported ? "check-circle" : "help-circle"} className="w-5 h-5 flex-shrink-0" />
                            <div className="text-sm font-medium">
                                {isApiSupported 
                                    ? "お使いのブラウザは「フォルダ直接保存」に対応しています。" 
                                    : "お使いの環境では「ZIPダウンロード」で画像を保存します（Safari/Firefox等）。"}
                            </div>
                        </div>

                        <div className="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden animate-in">
                            <div className="p-8 md:p-10">
                                {!isCompleted ? (
                                    <div className="space-y-8">
                                        {!file ? (
                                            <div 
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={handleFileDrop}
                                                className="relative group cursor-pointer"
                                            >
                                                <input type="file" accept=".pptx,.ppt" onChange={handleFileSelect} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                                <div className="border-4 border-dashed border-slate-100 rounded-2xl p-12 text-center group-hover:border-orange-200 group-hover:bg-orange-50 transition-all bg-slate-50/50">
                                                    <Icon name="upload-cloud" className="mx-auto w-12 h-12 text-slate-300 group-hover:text-orange-400 mb-4" />
                                                    <p className="text-lg font-bold text-slate-600">ファイルをここにドロップ</p>
                                                    <p className="text-xs text-slate-400 mt-2">またはクリックしてファイルを選択</p>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center justify-between p-5 bg-orange-50 rounded-xl border border-orange-100 animate-in">
                                                <div className="flex items-center space-x-4">
                                                    <div className="p-3 bg-white rounded-lg shadow-sm text-orange-600 font-bold text-xs uppercase">PPTX</div>
                                                    <div className="truncate max-w-[200px] md:max-w-xs font-bold text-slate-700">{file.name}</div>
                                                </div>
                                                <button onClick={() => setFile(null)} className="text-slate-400 hover:text-red-500 p-1"><Icon name="x" /></button>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-slate-100">
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest">保存方法</label>
                                                {isApiSupported ? (
                                                    <button 
                                                        onClick={handlePickDirectory}
                                                        className={`w-full flex items-center justify-between p-4 rounded-xl border-2 transition-all ${
                                                            directoryHandle ? 'border-green-500 bg-green-50' : 'border-slate-200 hover:border-orange-300'
                                                        }`}
                                                    >
                                                        <span className="text-sm font-bold truncate">
                                                            {directoryHandle ? `📁 ${directoryHandle.name}` : "保存先フォルダを選択"}
                                                        </span>
                                                        <Icon name={directoryHandle ? "check" : "chevron-right"} className={directoryHandle ? "text-green-500" : ""} />
                                                    </button>
                                                ) : (
                                                    <div className="p-4 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-400 text-sm font-bold flex items-center">
                                                        <Icon name="archive" className="w-4 h-4 mr-2" />
                                                        ZIP形式でダウンロード
                                                    </div>
                                                )}
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest">出力フォルダ名</label>
                                                <input 
                                                    type="text" 
                                                    value={folderName}
                                                    onChange={(e) => setFolderName(e.target.value)}
                                                    className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl text-sm font-bold focus:border-orange-500 outline-none"
                                                    placeholder="例: スライド画像"
                                                />
                                            </div>
                                        </div>

                                        {error && <div className="p-4 bg-red-50 text-red-600 text-xs font-bold rounded-xl border border-red-100">{error}</div>}

                                        {isProcessing ? (
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center text-xs font-black text-orange-600">
                                                    <span>CONVERTING SLIDES...</span>
                                                    <span>{progress}%</span>
                                                </div>
                                                <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-orange-500 transition-all duration-300" style={{width: `${progress}%`}}></div>
                                                </div>
                                            </div>
                                        ) : (
                                            <button 
                                                onClick={startConversion}
                                                disabled={!file}
                                                className={`w-full py-5 rounded-2xl font-black text-lg shadow-lg transition-all ${
                                                    file ? 'bg-orange-500 text-white hover:bg-orange-600 active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                                }`}
                                            >
                                                変換を開始
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-center py-6 animate-in">
                                        <div className="mx-auto w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
                                            <Icon name="check" className="w-10 h-10" />
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800">変換が完了しました</h2>
                                        <p className="text-slate-500 mt-2">
                                            {directoryHandle 
                                                ? `フォルダ「${directoryHandle.name}」に画像を保存しました。` 
                                                : "ボタンを押してZIPファイルを保存してください。"}
                                        </p>
                                        <div className="mt-10 flex flex-col sm:flex-row gap-4 justify-center">
                                            {!directoryHandle && (
                                                <button onClick={downloadAsZip} className="px-10 py-4 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 transition-all shadow-lg shadow-orange-200 flex items-center justify-center">
                                                    <Icon name="download" className="mr-2" /> ZIPを保存
                                                </button>
                                            )}
                                            <button onClick={reset} className="px-10 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-all">
                                                別のファイルを変換
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
