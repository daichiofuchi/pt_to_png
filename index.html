<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX to PNG Converter | GitHub Pages版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // LucideアイコンをReactコンポーネントとして簡易実装
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [file, setFile] = useState(null);
            const [folderName, setFolderName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [isCompleted, setIsCompleted] = useState(false);
            const [error, setError] = useState(null);

            const handleFileDrop = (e) => {
                e.preventDefault();
                const droppedFile = e.dataTransfer.files[0];
                validateAndSetFile(droppedFile);
            };

            const handleFileSelect = (e) => {
                const selectedFile = e.target.files[0];
                validateAndSetFile(selectedFile);
            };

            const validateAndSetFile = (selectedFile) => {
                if (selectedFile && (selectedFile.name.endsWith('.pptx') || selectedFile.name.endsWith('.ppt'))) {
                    setFile(selectedFile);
                    setFolderName(selectedFile.name.replace(/\.[^/.]+$/, ""));
                    setError(null);
                } else {
                    setError('PowerPointファイル (.pptx) を選択してください。');
                }
            };

            const startConversion = () => {
                if (!file || !folderName) return;
                setIsProcessing(true);
                setProgress(0);
                
                // クライアントサイドでのシミュレーション
                // 実際にはJSZipやCanvasを使用してレンダリングする処理をここに組み込みます
                const interval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            setIsProcessing(false);
                            setIsCompleted(true);
                            return 100;
                        }
                        return prev + 10;
                    });
                }, 200);
            };

            const reset = () => {
                setFile(null);
                setFolderName('');
                setIsCompleted(false);
                setProgress(0);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-10 text-center">
                            <div className="inline-flex items-center justify-center p-4 bg-orange-100 rounded-3xl mb-6 shadow-sm">
                                <Icon name="file-digit" className="w-12 h-12 text-orange-600" />
                            </div>
                            <h1 className="text-4xl font-extrabold tracking-tight text-slate-800">PPTX to PNG</h1>
                            <p className="text-slate-500 mt-3 text-lg">GitHub Pagesで動作するスライド一括変換ツール</p>
                        </header>

                        <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/60 border border-slate-100 overflow-hidden">
                            <div className="p-8 md:p-12">
                                {!isCompleted ? (
                                    <div className="space-y-8">
                                        {/* Drop Zone */}
                                        {!file ? (
                                            <div 
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={handleFileDrop}
                                                className="relative group"
                                            >
                                                <input 
                                                    type="file" 
                                                    accept=".pptx,.ppt"
                                                    onChange={handleFileSelect}
                                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                                />
                                                <div className="border-4 border-dashed border-slate-100 rounded-[1.5rem] p-16 text-center group-hover:border-orange-300 group-hover:bg-orange-50 transition-all duration-500 bg-slate-50/50">
                                                    <div className="mx-auto w-20 h-20 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:scale-110 transition-transform">
                                                        <Icon name="upload-cloud" className="w-10 h-10 text-slate-400 group-hover:text-orange-500" />
                                                    </div>
                                                    <p className="text-xl font-bold text-slate-700">PPTXファイルをドロップ</p>
                                                    <p className="text-sm text-slate-400 mt-2">またはクリックしてファイルを選択</p>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center justify-between p-6 bg-orange-50 rounded-2xl border border-orange-100 animate-in">
                                                <div className="flex items-center space-x-5">
                                                    <div className="p-3 bg-white rounded-xl shadow-sm text-orange-600">
                                                        <Icon name="presentation" className="w-8 h-8" />
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-slate-800 text-lg truncate max-w-[250px] md:max-w-md">{file.name}</p>
                                                        <p className="text-sm text-orange-600/70 font-medium">{(file.size / 1024 / 1024).toFixed(2)} MB</p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => setFile(null)}
                                                    className="p-2 hover:bg-red-100 rounded-full text-slate-400 hover:text-red-500 transition-all"
                                                >
                                                    <Icon name="x" className="w-6 h-6" />
                                                </button>
                                            </div>
                                        )}

                                        {/* Settings */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-8 border-t border-slate-100">
                                            <div className="space-y-3">
                                                <label className="flex items-center text-sm font-bold text-slate-700 uppercase tracking-wider">
                                                    <Icon name="folder" className="w-4 h-4 mr-2 text-orange-500" />
                                                    保存先フォルダ名
                                                </label>
                                                <input 
                                                    type="text" 
                                                    value={folderName}
                                                    onChange={(e) => setFolderName(e.target.value)}
                                                    placeholder="フォルダ名を入力"
                                                    className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 outline-none transition-all font-medium"
                                                />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="flex items-center text-sm font-bold text-slate-700 uppercase tracking-wider">
                                                    <Icon name="hash" className="w-4 h-4 mr-2 text-orange-500" />
                                                    出力設定
                                                </label>
                                                <div className="flex items-center space-x-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <Icon name="check-square" className="w-5 h-5 text-green-500" />
                                                    <span className="text-sm font-medium text-slate-600">1.png からの連番保存</span>
                                                </div>
                                            </div>
                                        </div>

                                        {error && (
                                            <div className="flex items-center p-4 text-red-700 bg-red-50 rounded-xl border border-red-100 animate-in">
                                                <Icon name="alert-circle" className="w-5 h-5 mr-3" />
                                                <span className="font-medium">{error}</span>
                                            </div>
                                        )}

                                        <div className="pt-4">
                                            {isProcessing ? (
                                                <div className="space-y-4">
                                                    <div className="flex justify-between items-end">
                                                        <div className="flex items-center text-orange-600 font-bold">
                                                            <Icon name="loader-2" className="w-5 h-5 mr-2 animate-spin" />
                                                            変換処理中...
                                                        </div>
                                                        <span className="text-2xl font-black text-orange-600">{progress}%</span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden p-1 shadow-inner">
                                                        <div 
                                                            className="bg-gradient-to-r from-orange-400 to-orange-600 h-full transition-all duration-300 ease-out rounded-full shadow-lg"
                                                            style={{ width: `${progress}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <button 
                                                    onClick={startConversion}
                                                    disabled={!file || !folderName}
                                                    className={`w-full py-5 rounded-2xl font-black text-lg text-white shadow-xl transition-all flex items-center justify-center space-x-3 ${
                                                        file && folderName 
                                                            ? 'bg-orange-500 hover:bg-orange-600 hover:shadow-orange-200 active:scale-95' 
                                                            : 'bg-slate-200 cursor-not-allowed text-slate-400'
                                                    }`}
                                                >
                                                    <Icon name="zap" className="w-6 h-6" />
                                                    <span>一括変換を実行</span>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-6 animate-in">
                                        <div className="mx-auto w-24 h-24 bg-green-100 rounded-3xl flex items-center justify-center mb-8 shadow-sm">
                                            <Icon name="party-popper" className="w-12 h-12 text-green-600" />
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-800">変換完了！</h2>
                                        <p className="text-slate-500 mt-4 text-lg">
                                            フォルダ「<span className="text-slate-900 font-bold underline decoration-orange-300 decoration-4">{folderName}</span>」形式で<br/>
                                            全ての画像が準備できました。
                                        </p>
                                        
                                        <div className="mt-10 p-6 bg-slate-50 rounded-2xl border border-slate-100 text-left mb-10">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">保存内容</h3>
                                            <div className="grid grid-cols-4 gap-2">
                                                {[1,2,3,4].map(i => (
                                                    <div key={i} className="aspect-video bg-white rounded-lg border border-slate-200 flex items-center justify-center text-xs font-bold text-slate-300">
                                                        {i}.png
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                                            <button className="w-full sm:w-auto px-10 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center shadow-lg active:scale-95">
                                                <Icon name="download" className="w-5 h-5 mr-2" />
                                                ZIPで一括保存
                                            </button>
                                            <button 
                                                onClick={reset}
                                                className="w-full sm:w-auto px-10 py-4 bg-white text-slate-600 border-2 border-slate-100 rounded-2xl font-bold hover:bg-slate-50 transition-all active:scale-95"
                                            >
                                                トップに戻る
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="px-8 py-5 bg-slate-50 border-t border-slate-100">
                                <div className="flex items-center justify-center space-x-6 text-slate-400">
                                    <div className="flex items-center text-xs font-medium">
                                        <Icon name="shield-check" className="w-3 h-3 mr-1" />
                                        サーバーレス動作
                                    </div>
                                    <div className="flex items-center text-xs font-medium">
                                        <Icon name="lock" className="w-3 h-3 mr-1" />
                                        プライバシー保護
                                    </div>
                                    <div className="flex items-center text-xs font-medium">
                                        <Icon name="github" className="w-3 h-3 mr-1" />
                                        GitHub Pages
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <footer className="mt-12 text-center text-slate-400 text-sm">
                            <p>&copy; 2024 PPTX Converter Tool. Built with React & Tailwind.</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
