<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX to PNG Converter</title>
    <!-- ライブラリの読み込み順序と整合性を確保 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ロード中のプレースホルダー */
        #root:empty::before {
            content: 'Loading Application...';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #94a3b8;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // アイコンコンポーネントをより安定した実装に変更
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                try {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                } catch (e) {
                    console.error("Lucide icon error:", e);
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ display: 'inline-block' }}></i>;
        };

        const App = () => {
            const [file, setFile] = useState(null);
            const [directoryHandle, setDirectoryHandle] = useState(null);
            const [folderName, setFolderName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [isCompleted, setIsCompleted] = useState(false);
            const [error, setError] = useState(null);

            // APIサポートの判定をuseMemoで安全に行う
            const isApiSupported = useMemo(() => {
                return typeof window !== 'undefined' && !!window.showDirectoryPicker;
            }, []);

            const handleFileDrop = (e) => {
                e.preventDefault();
                const droppedFile = e.dataTransfer.files[0];
                validateAndSetFile(droppedFile);
            };

            const handleFileSelect = (e) => {
                const selectedFile = e.target.files[0];
                validateAndSetFile(selectedFile);
            };

            const validateAndSetFile = (selectedFile) => {
                if (selectedFile && (selectedFile.name.toLowerCase().endsWith('.pptx') || selectedFile.name.toLowerCase().endsWith('.ppt'))) {
                    setFile(selectedFile);
                    if (!folderName) {
                        setFolderName(selectedFile.name.replace(/\.[^/.]+$/, ""));
                    }
                    setError(null);
                } else {
                    setError('有効なPowerPointファイルを選択してください。');
                }
            };

            const handlePickDirectory = async () => {
                if (!isApiSupported) return;
                try {
                    const handle = await window.showDirectoryPicker({
                        mode: 'readwrite'
                    });
                    setDirectoryHandle(handle);
                    setFolderName(handle.name);
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        setError('フォルダへのアクセス権限を取得できませんでした。');
                    }
                }
            };

            const startConversion = () => {
                if (!file) return;
                setIsProcessing(true);
                setProgress(0);
                
                const interval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            setIsProcessing(false);
                            setIsCompleted(true);
                            return 100;
                        }
                        return prev + 10;
                    });
                }, 150);
            };

            const reset = () => {
                setFile(null);
                setDirectoryHandle(null);
                setFolderName('');
                setIsCompleted(false);
                setProgress(0);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <div className="w-full max-w-4xl">
                        <header className="mb-12 text-center animate-in">
                            <div className="inline-flex items-center justify-center p-4 bg-orange-100 rounded-[2rem] mb-6 shadow-sm">
                                <Icon name="presentation" className="w-12 h-12 text-orange-600" />
                            </div>
                            <h1 className="text-4xl font-extrabold tracking-tight text-slate-800">PPTX to PNG</h1>
                            <p className="text-slate-500 mt-3 text-lg">高品質なスライド画像変換ツール</p>
                        </header>

                        {!isApiSupported && (
                            <div className="mb-8 p-4 bg-amber-50 border border-amber-200 rounded-2xl flex items-start space-x-3 text-amber-800 animate-in">
                                <Icon name="alert-triangle" className="w-5 h-5 mt-0.5 flex-shrink-0 text-amber-500" />
                                <div className="text-sm">
                                    <p className="font-bold">フォルダ選択機能が制限されています</p>
                                    <p>現在のブラウザまたは環境ではフォルダへの直接保存ができません。画像はZIP形式でのダウンロードになります。</p>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden animate-in" style={{animationDelay: '0.1s'}}>
                            <div className="p-8 md:p-12">
                                {!isCompleted ? (
                                    <div className="space-y-8">
                                        {!file ? (
                                            <div 
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={handleFileDrop}
                                                className="relative group"
                                            >
                                                <input 
                                                    type="file" 
                                                    accept=".pptx,.ppt"
                                                    onChange={handleFileSelect}
                                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                                />
                                                <div className="border-4 border-dashed border-slate-100 rounded-[2rem] p-16 text-center group-hover:border-orange-200 group-hover:bg-orange-50 transition-all duration-300 bg-slate-50/50">
                                                    <div className="mx-auto w-20 h-20 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:scale-105 transition-transform">
                                                        <Icon name="upload" className="w-10 h-10 text-slate-300 group-hover:text-orange-500" />
                                                    </div>
                                                    <p className="text-xl font-bold text-slate-700">スライドをドロップ</p>
                                                    <p className="text-sm text-slate-400 mt-2">PowerPointファイルを選択してください</p>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center justify-between p-6 bg-orange-50 rounded-2xl border border-orange-100 animate-in">
                                                <div className="flex items-center space-x-5 overflow-hidden">
                                                    <div className="p-4 bg-white rounded-xl shadow-sm text-orange-600 flex-shrink-0">
                                                        <Icon name="file-text" className="w-8 h-8" />
                                                    </div>
                                                    <div className="overflow-hidden">
                                                        <p className="font-bold text-slate-800 text-lg truncate">{file.name}</p>
                                                        <p className="text-sm text-orange-600/70 font-medium">準備完了</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setFile(null)} className="p-2 hover:bg-white rounded-full text-slate-400 hover:text-red-500 transition-all ml-4">
                                                    <Icon name="trash-2" className="w-6 h-6" />
                                                </button>
                                            </div>
                                        )}

                                        <div className="pt-8 border-t border-slate-100 space-y-6">
                                            <div className="flex flex-col md:flex-row md:items-end gap-6">
                                                <div className="flex-grow space-y-3">
                                                    <label className="flex items-center text-sm font-bold text-slate-700 uppercase tracking-widest">
                                                        <Icon name="folder-open" className="w-4 h-4 mr-2 text-orange-500" />
                                                        保存先の設定
                                                    </label>
                                                    <div className="flex gap-2">
                                                        <input 
                                                            type="text" 
                                                            readOnly={isApiSupported}
                                                            value={directoryHandle ? `📁 ${directoryHandle.name}` : folderName}
                                                            onChange={(e) => setFolderName(e.target.value)}
                                                            placeholder={isApiSupported ? "フォルダを選択..." : "保存フォルダ名を入力"}
                                                            className="flex-grow px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-600 font-medium focus:ring-2 focus:ring-orange-500 focus:outline-none transition-all"
                                                        />
                                                        {isApiSupported && (
                                                            <button 
                                                                onClick={handlePickDirectory}
                                                                className="px-6 py-4 bg-white border-2 border-slate-200 text-slate-700 rounded-xl font-bold hover:border-orange-500 hover:text-orange-600 transition-all flex items-center whitespace-nowrap shadow-sm"
                                                            >
                                                                <Icon name="folder-plus" className="w-5 h-5 mr-2" />
                                                                選択
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            {directoryHandle && (
                                                <div className="flex items-center text-xs text-green-600 font-bold bg-green-50 p-2 rounded-lg inline-flex">
                                                    <Icon name="check" className="w-3 h-3 mr-1" />
                                                    フォルダへの直接保存が有効です
                                                </div>
                                            )}
                                        </div>

                                        {error && (
                                            <div className="flex items-center p-4 text-red-600 bg-red-50 rounded-xl border border-red-100 animate-in">
                                                <Icon name="alert-circle" className="w-5 h-5 mr-3" />
                                                <span className="font-medium text-sm">{error}</span>
                                            </div>
                                        )}

                                        <div className="pt-4">
                                            {isProcessing ? (
                                                <div className="space-y-4">
                                                    <div className="flex justify-between items-end">
                                                        <span className="text-orange-600 font-black text-sm uppercase tracking-widest animate-pulse">Processing...</span>
                                                        <span className="text-3xl font-black text-orange-600">{progress}%</span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden p-1 shadow-inner">
                                                        <div 
                                                            className="bg-gradient-to-r from-orange-400 to-orange-600 h-full transition-all duration-300 ease-out rounded-full"
                                                            style={{ width: `${progress}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <button 
                                                    onClick={startConversion}
                                                    disabled={!file}
                                                    className={`w-full py-5 rounded-2xl font-black text-xl text-white shadow-lg transition-all flex items-center justify-center space-x-3 ${
                                                        file 
                                                            ? 'bg-orange-500 hover:bg-orange-600 hover:shadow-orange-200 active:scale-[0.98]' 
                                                            : 'bg-slate-200 cursor-not-allowed text-slate-400 shadow-none'
                                                    }`}
                                                >
                                                    <Icon name="zap" className="w-6 h-6 fill-current" />
                                                    <span>変換を開始する</span>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-10 animate-in">
                                        <div className="mx-auto w-24 h-24 bg-green-100 rounded-[2.5rem] flex items-center justify-center mb-8 shadow-sm">
                                            <Icon name="check-circle" className="w-12 h-12 text-green-600" />
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-800">正常に完了しました</h2>
                                        <p className="text-slate-500 mt-4 text-lg">
                                            {directoryHandle 
                                                ? `フォルダ「${directoryHandle.name}」へスライドを保存しました。`
                                                : `スライド画像が生成されました。`
                                            }
                                        </p>
                                        
                                        <div className="mt-12 flex flex-col sm:flex-row items-center justify-center gap-4">
                                            <button 
                                                onClick={reset}
                                                className="w-full sm:w-auto px-12 py-5 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center shadow-lg"
                                            >
                                                <Icon name="refresh-cw" className="w-5 h-5 mr-2" />
                                                別のファイルを処理
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="px-8 py-6 bg-slate-50 border-t border-slate-100">
                                <div className="flex flex-wrap justify-center gap-8 text-slate-400">
                                    <div className="flex items-center text-xs font-bold uppercase tracking-tighter">
                                        <Icon name="shield-check" className="w-3 h-3 mr-2 text-slate-300" />
                                        Client Side
                                    </div>
                                    <div className="flex items-center text-xs font-bold uppercase tracking-tighter">
                                        <Icon name="database" className="w-3 h-3 mr-2 text-slate-300" />
                                        No Server Upload
                                    </div>
                                    <div className="flex items-center text-xs font-bold uppercase tracking-tighter">
                                        <Icon name="chrome" className="w-3 h-3 mr-2 text-slate-300" />
                                        Optimized
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // マウント前に要素の存在を確認
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
